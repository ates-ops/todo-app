<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Aufgaben</h1>
      <span id="task-count" class="task-count">0 offen</span>
    </header>

    <div class="input-row">
      <input
        type="text"
        id="todo-input"
        placeholder="Neue Aufgabe hinzufügen..."
        maxlength="200"
        autocomplete="off"
      />
      <select id="category-select" aria-label="Kategorie">
        <option value="">– Kategorie –</option>
        <option value="work">Arbeit</option>
        <option value="private">Privat</option>
        <option value="shopping">Shopping</option>
      </select>
      <select id="priority-select" aria-label="Priorität">
        <option value="">– Priorität –</option>
        <option value="high">Hoch</option>
        <option value="medium">Mittel</option>
        <option value="low">Niedrig</option>
      </select>
      <input type="date" id="due-date-input" aria-label="Fälligkeitsdatum" />
      <button id="add-btn" aria-label="Hinzufügen">+</button>
    </div>

    <div class="filter-row">
      <button class="filter-btn active" data-filter="all">Alle</button>
      <button class="filter-btn" data-filter="open">Offen</button>
      <button class="filter-btn" data-filter="done">Erledigt</button>
      <button id="sort-priority-btn" class="filter-btn sort-btn" title="Nach Priorität sortieren">&#8597; Priorität</button>
    </div>

    <div class="category-filter-row">
      <button class="cat-btn active" data-cat="all">Alle Kategorien</button>
      <button class="cat-btn" data-cat="work">Arbeit</button>
      <button class="cat-btn" data-cat="private">Privat</button>
      <button class="cat-btn" data-cat="shopping">Shopping</button>
    </div>

    <ul id="todo-list"></ul>

    <footer id="footer" class="footer hidden">
      <span id="done-count"></span>
      <button id="clear-done-btn">Erledigte löschen</button>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
